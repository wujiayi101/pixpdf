name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets are required"
            exit 1
          fi
          if ! npx --yes wrangler@3 pages project list | grep -qw pixpdf; then
            echo "Creating Cloudflare Pages project pixpdf"
            npx --yes wrangler@3 pages project create pixpdf --production-branch=main
          else
            echo "Cloudflare Pages project pixpdf already exists"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pixpdf --branch=main --commit-dirty=true

      - name: Attach custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/pixpdf/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"pixpdf.wu101.com"}')
          body="${response%$'\n'*}"
          status="${response##*$'\n'}"
          if [ "$status" = "200" ]; then
            echo "Attached custom domain pixpdf.wu101.com"
          elif echo "$body" | grep -q "already exists"; then
            echo "Custom domain pixpdf.wu101.com already attached"
          else
            echo "$body"
            echo "::error::Failed to attach custom domain (HTTP $status)"
            exit 1
          fi

      - name: Ensure DNS CNAME record
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          zone_id=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=wu101.com" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r '.result[0].id')
          if [ -z "$zone_id" ] || [ "$zone_id" = "null" ]; then
            echo "::warning::Could not find DNS zone for wu101.com. Add CNAME manually or grant Zone DNS permissions to the API token."
            exit 0
          fi

          existing=$(curl -sS "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records?type=CNAME&name=pixpdf.wu101.com" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r '.result[0].id // empty')

          if [ -n "$existing" ]; then
            echo "CNAME record pixpdf.wu101.com already exists"
            exit 0
          fi

          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "type": "CNAME",
              "name": "pixpdf",
              "content": "pixpdf.pages.dev",
              "proxied": true,
              "ttl": 1
            }' | jq -e '.success' > /dev/null
          echo "Created CNAME pixpdf.wu101.com -> pixpdf.pages.dev"

      - name: Deployment URL
        if: success()
        run: |
          echo "Deployed to https://pixpdf.pages.dev"
          echo "Custom domain https://pixpdf.wu101.com"
